# https://taskfile.dev
version: '3'

tasks:

  default:
    desc: List all available tasks.
    cmds:
      - task --list

  dev:
    desc: Start the dev stack. Builds deps on first run, skips if already running.
    cmds:
      - bash scripts/dev.sh

  stop:
    desc: Stop and remove all containers. MongoDB volume is preserved.
    cmds:
      - bash scripts/stop.sh

  rebuild:
    desc: Force-rebuild everything from scratch (no cache), then restart.
    cmds:
      - bash scripts/rebuild.sh
