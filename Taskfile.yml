# https://taskfile.dev
version: '3'

vars:
  COMPOSE_FILE: docker-compose.yml
  DEPS_IMAGE: pdf-parser-backend-deps:latest
  DEPS_DOCKERFILE: backend/docker/backend.deps.dockerfile

tasks:

  # ── Docker ────────────────────────────────────────────────────────────────

  dev:
    desc: >
      Start the full stack (backend + frontend + MongoDB).
      Builds the deps image automatically on first run — subsequent starts are fast.
    cmds:
      - bash scripts/dev.sh

  stop:
    desc: >
      Stop and remove all running containers.
      MongoDB data volume is kept, so history is preserved between restarts.
    cmds:
      - bash scripts/stop.sh

  rebuild:
    desc: >
      Force-rebuild EVERYTHING from scratch with no Docker cache, then restart.
      Run this whenever pyproject.toml or system-level packages change.
    cmds:
      - bash scripts/rebuild.sh

  build:deps:
    desc: >
      Build only the heavy deps image (system packages + pip install).
      Skips this if the image already exists — use rebuild to force a fresh build.
    cmds:
      - docker build -f {{.DEPS_DOCKERFILE}} -t {{.DEPS_IMAGE}} .