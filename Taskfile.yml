# https://taskfile.dev
version: '3'

tasks:

  default:
    desc: Show all available tasks
    cmds:
      - task --list

  up:
    desc: Start all services — builds deps image if missing, then builds app image + starts containers
    cmds:
      - bash ./bin/compose/up-local.sh

  down:
    desc: Stop containers (keeps volumes and deps image intact)
    cmds:
      - bash ./bin/compose/down-local.sh

  clean:
    desc: Stop containers and remove volumes (deletes Mongo history)
    cmds:
      - bash ./bin/compose/down-local.sh -v

  build-deps:
    desc: (Re)build the backend deps image — run only when pyproject.toml changes
    cmds:
      - bash ./bin/compose/build-deps.sh

  restart:
    desc: Restart running containers without rebuilding
    cmds:
      - bash ./bin/compose/restart-local.sh


