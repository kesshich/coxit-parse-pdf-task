# https://taskfile.dev
version: '3'

tasks:

  default:
    desc: Show all available tasks
    cmds:
      - task --list

  up:
    desc: Start frontend + backend + mongo (docker compose)
    cmds:
      - bash ./bin/compose/up-local.sh

  down:
    desc: Stop containers (keeps volumes)
    cmds:
      - bash ./bin/compose/down-local.sh

  clean:
    desc: Stop containers and remove volumes too (deletes Mongo history)
    cmds:
      - bash ./bin/compose/down-local.sh -v

  restart:
    desc: Restart running containers
    cmds:
      - bash ./bin/compose/restart-local.sh

  ps:
    desc: Show docker compose status
    cmds:
      - bash ./bin/compose/ps-local.sh

