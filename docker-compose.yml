services:
  backend:
    build:
      context: .
      dockerfile: backend/docker/backend.dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - mongo
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local