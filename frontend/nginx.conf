server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; fall back to index.html for all other routes
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite content-hashes the filenames.
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

